services:
  worker-1:
    build: .
    container_name: worker-1
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - MONGO_URI=mongodb://10.104.0.2:27017/orderdb
      - MONGO_MAX_POOL_SIZE=50
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  worker-2:
    build: .
    container_name: worker-2
    restart: unless-stopped
    ports:
      - "5002:5000"
    environment:
      - MONGO_URI=mongodb://10.104.0.2:27017/orderdb
      - MONGO_MAX_POOL_SIZE=50
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M